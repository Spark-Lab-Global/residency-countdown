<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S5 Residency Countdown | Spark Lab</title>
    <style>

        @font-face {
            font-family: 'Fira Code';
            font-weight: 100 700;
            font-display: block;
            src: url('file:///android_asset/fonts/FiraCode.woff2') format('woff2');
        }
        @font-face {
            font-family: 'JetBrains Mono';
            font-weight: 100 700;
            font-display: block;
            src: url('file:///android_asset/fonts/FiraCode.woff2') format('woff2');
        }
        @font-face {
            font-family: 'Cinzel';
            font-weight: 400 700;
            font-display: block;
            src: url('file:///android_asset/fonts/Cinzel.woff2') format('woff2');
        }
        
        @font-face {
            font-family: 'Impact';
            src: local('Impact'), local('Impact MT');
        }
        
        :root {
            --main-color: #ff6737;
            --glow-intensity: 0.6;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            background: #000000;
            color: #ffffff;
            overflow: hidden;
            position: relative;
            width: 100vw;
            height: 100vh;
            font-variant-numeric: slashed-zero;
            font-feature-settings: "zero" 1;
            transition: background 1s ease;
        }
        
        body.countdown-inactive {
            background: #ffffff;
        }

        /* 起止前后各 10s（共 20s 窗口）：每秒黑/白切换一次，短时过渡避免与 1s 淡入淡出糊在一起 */
        body.countdown-flicker {
            transition: background 0.05s linear, color 0.05s linear;
        }
        
        /* 背景层 - 代码雨效果 */
        #matrix-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.02;
            pointer-events: none;
        }
        
        /* 轨道系统 */
        .orbital-system {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        
        .orbit {
            position: absolute;
            border: 1px solid rgba(255, 103, 55, 0.08);
            border-radius: 50%;
            animation: rotate 120s linear infinite;
        }
        
        .orbit:nth-child(1) {
            width: 30vw;
            height: 30vw;
            animation-duration: 90s;
        }
        
        .orbit:nth-child(2) {
            width: 50vw;
            height: 50vw;
            animation-duration: 120s;
            animation-direction: reverse;
        }
        
        .orbit:nth-child(3) {
            width: 70vw;
            height: 70vw;
            animation-duration: 180s;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* 音频可视化波形环 - 更凝实的设计 */
        .audio-visualizer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vw;
            max-width: 80vh;
            max-height: 80vh;
            pointer-events: none;
            z-index: 5;
        }
        
        .wave-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid rgba(255, 103, 55, 0.1);
            border-radius: 50%;
            opacity: 0;
            animation: wave-pulse 6s ease-out infinite;
        }
        
        .wave-circle:nth-child(2) {
            animation-delay: 1.5s;
            border-width: 2px;
        }
        
        .wave-circle:nth-child(3) {
            animation-delay: 3s;
            border-width: 1px;
        }
        
        @keyframes wave-pulse {
            0% {
                transform: scale(0.85);
                opacity: 0;
                border-color: rgba(255, 103, 55, 0.4);
            }
            20% {
                opacity: 0.8;
                border-color: rgba(255, 103, 55, 0.3);
            }
            100% {
                transform: scale(1.3);
                opacity: 0;
                border-color: rgba(255, 103, 55, 0);
            }
        }
        
        /* SVG波形路径 - 更厚实 */
        #waveform-svg {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 6;
        }
        
        .waveform-path {
            fill: none;
            stroke: rgba(255, 103, 55, 0.4);
            stroke-width: 3;
            stroke-linecap: round;
            filter: none;
        }
        
        /* 主倒计时容器 */
        .countdown-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
        }
        
        /* 倒计时数字组 */
        .countdown-display {
            display: flex;
            gap: 0.4vw;
            justify-content: center;
            align-items: center;
            margin-bottom: 2vh;
        }
        
        /* 时间单元 */
        .time-unit {
            position: relative;
        }
        
        /* 数字样式 - 核心设计 */
        .digit-group {
            display: flex;
            gap: 0.1vw;
            position: relative;
        }
        
        .digit {
            width: 7.5vw;
            height: 14vh;
            position: relative;
            background: linear-gradient(135deg, rgba(255, 103, 55, 0.02), transparent);
            border: 0.5px solid rgba(255, 103, 55, 0.1);
            box-shadow: inset 0 0 20px rgba(255, 103, 55, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .digit-value {
    font-size: 14vh;
            font-weight: normal;
            font-family: 'Impact', 'Arial Black', sans-serif;
            color: var(--main-color);
            text-shadow: 
                0 0 30px rgba(255, 103, 55, var(--glow-intensity)),
                0 0 60px rgba(255, 103, 55, 0.3);
            position: relative;
            z-index: 2;
            font-variant-numeric: slashed-zero;
            font-feature-settings: "zero" 1;
            transition: opacity 0.6s ease, color 0.5s ease;
        }
        
        /* 数字变化时的平滑过渡 */
        .digit.changing .digit-value {
            opacity: 0.7;
        }
        
        /* 移除脉动，保持稳定 */
        
        /* 分隔符 - 缓慢的呼吸感 */
        .separator {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 6vh;
            color: rgba(255, 103, 55, 0.5);
            margin: 0 0.4vw;
            animation: blink 3s ease-in-out infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.3; }
        }
        
        /* 时间标签 - 更清晰 */
        .time-label {
            font-size: 1.3vh;
            color: rgba(255, 255, 255, 0.25);
            text-transform: uppercase;
            letter-spacing: 0.25em;
            margin-top: 1.5vh;
            font-weight: 100;
            font-family: 'Fira Code', monospace;
        }
        
        /* 左上角进度条组件 - Community Dinner */
        .community-dinner-progress {
            position: absolute;
            top: 5vh;
            left: 5vw;
            z-index: 15;
            display: flex;
            flex-direction: column;
            gap: 0.6vh;
        }
        
        .community-dinner-date-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 20vw;
        }
        
        .community-dinner-date {
            font-family: 'Cinzel', serif;
            font-size: 0.9vh;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.1em;
            font-weight: 500;
        }
        
        .community-dinner-bar-container {
            position: relative;
            width: 20vw;
            height: 2px;
            border: 0.5px solid rgba(255, 103, 55, 0.15);
            background: rgba(255, 103, 55, 0.03);
            overflow: visible;
        }
        
        .community-dinner-bar-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 2px;
            background: rgba(200, 80, 40, 0.7);
            transition: width 1s ease;
            min-width: 0;
        }
        
        .community-dinner-progress-marker {
            position: absolute;
            top: 50%;
            left: 0; /* 初始位置 */
            transform: translate(-50%, -50%);
            width: 1.5px;
            height: 10px;
            background: rgba(255, 255, 255, 0.4);
            z-index: 2;
        }
        
        .community-dinner-label {
            font-family: 'Cinzel', serif;
            font-size: 1.45vh;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 500;
        }
        
        .community-dinner-countdown {
            font-family: 'Cinzel', serif;
            font-size: 0.9vh;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.1em;
            font-weight: 500;
        }
        
        /* 进度条 - 更低调 */
        .progress-bar {
            position: absolute;
            bottom: 5vh;
            left: 50%;
            transform: translateX(-50%);
            width: 60vw;
            height: 0.5px;
            background: rgba(255, 103, 55, 0.05);
            display: none; /* 隐藏底部橙色直线 */
        }
        
        .progress-fill {
            height: 100%;
            background: rgba(255, 103, 55, 0.3);
            transition: width 1s linear;
        }
        
        /* 底部标语 */
        .bottom-tagline {
            position: absolute;
            bottom: 2.5vh;
            left: 50%;
            transform: translateX(-50%);
            font-family: Georgia, serif;
            font-style: italic;
            font-size: 1.6vh;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 0.08em;
            white-space: nowrap;
            text-shadow: 0 0 10px rgba(255, 103, 55, 0.2);
            padding: 0.5vh 2vw;
        }
        
        .bottom-tagline .sparklab-city {
            color: var(--main-color);
            text-shadow: 0 0 10px rgba(255, 103, 55, 0.4);
        }

        body.countdown-inactive .bottom-tagline:not(.completion-message) {
            color: rgba(0, 0, 0, 0.68);
            text-shadow: none;
        }

        body.countdown-inactive .bottom-tagline:not(.completion-message) .sparklab-city {
            color: #ed743d;
            text-shadow: none;
        }

        /* 白底（未开始/已结束）：左上角 Ship it Monday 组件反色对比 */
        body.countdown-inactive .community-dinner-date,
        body.countdown-inactive .community-dinner-label,
        body.countdown-inactive .community-dinner-countdown {
            color: rgba(0, 0, 0, 0.58);
            font-weight: 500;
        }

        body.countdown-inactive .community-dinner-bar-container {
            border-color: rgba(0, 0, 0, 0.18);
            background: rgba(0, 0, 0, 0.05);
        }

        body.countdown-inactive .community-dinner-bar-fill {
            background: rgba(255, 103, 55, 0.6);
        }

        body.countdown-inactive .community-dinner-progress-marker {
            background: rgba(0, 0, 0, 0.45);
        }

        /* 白底：右上角字重微增；同原橙色系略提亮度便于白底阅读 */
        body.countdown-inactive .vitals-indicator {
            color: rgba(255, 103, 55, 0.45);
            font-weight: 400;
        }

        body.countdown-inactive .vitals-indicator .glitch-text {
            color: rgba(255, 103, 55, 0.52);
        }

        body.countdown-inactive .vitals-indicator .pulse-dot {
            background: rgba(255, 103, 55, 0.72);
        }
        
        .completion-message {
            bottom: 5vh;
            display: none;
        }
        
        .completion-message .highlight {
            color: var(--main-color);
        }
        
        /* 火花粒子容器 */
        #particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 103, 55, 0.6);
            border-radius: 50%;
            pointer-events: none;
            animation: float 15s ease-out forwards;
            filter: blur(0.5px);
        }
        
        @keyframes float {
            0% {
                opacity: 0;
                transform: translate(0, 0) scale(0);
            }
            10% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0.5);
            }
        }
        
        /* 呼吸光晕 - 更缓慢的节奏 */
        .glow-orb {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 45vw;
            height: 45vw;
            background: radial-gradient(circle, rgba(255, 103, 55, 0.08), transparent 70%);
            animation: breathe 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
        }
        
        @keyframes breathe {
            0%, 100% {
                transform: translate(-50%, -50%) scale(0.95);
                opacity: 0.4;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.05);
                opacity: 0.7;
            }
        }
        
        /* Grid 网格背景 - 缓慢移动 */
        .grid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 103, 55, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 103, 55, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: grid-move 30s linear infinite;
        }
        
        @keyframes grid-move {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        
        /* 毫秒显示 - 稍微亮一点 */
        .milliseconds {
            position: absolute;
            bottom: -3vh;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2vh;
            color: rgba(255, 103, 55, 0.2);
            font-weight: 100;
            letter-spacing: 0.1em;
        }
        
        /* 生命体征指示器 - 稍微亮一点 */
        .vitals-indicator {
            position: absolute;
            top: 5vh;
            right: 5vw;
            font-size: 1.2vh;
            color: rgba(255, 103, 55, 0.35);
            text-align: right;
            font-weight: 400;
            letter-spacing: 0.1em;
        }
        
        .vitals-indicator span {
            display: block;
            margin: 0.5vh 0;
        }
        
        .pulse-dot {
            display: inline-block;
            width: 4px;
            height: 4px;
            background: rgba(255, 103, 55, 0.6);
            border-radius: 50%;
            margin-left: 5px;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        
        @keyframes pulse-dot {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }
        
        /* Glitch效果 for commits */
        .glitch-text {
            position: relative;
            display: inline-block;
            color: rgba(255, 103, 55, 0.4);
        }
        
        .glitch-text.glitching {
            animation: glitch-flicker 0.3s ease;
        }
        
        @keyframes glitch-flicker {
            0%, 100% { 
                opacity: 1;
                transform: translateX(0);
            }
            20% { 
                opacity: 0.8;
                transform: translateX(-1px);
            }
            40% { 
                opacity: 0.6;
                transform: translateX(1px);
            }
            60% { 
                opacity: 0.9;
                transform: translateX(-0.5px);
            }
        }
        
        /* 21:00 仪式效果 - 更内敛 */
        .ritual-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent, rgba(255, 103, 55, 0.1));
            opacity: 0;
            pointer-events: none;
            z-index: 20;
        }
        
        .ritual-overlay.active {
            animation: ritual-pulse 12s ease-out;
        }
        
        @keyframes ritual-pulse {
            0% { opacity: 0; }
            10% { opacity: 0.8; }
            100% { opacity: 0; }
        }
        
        .ritual-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.8vh;
            color: rgba(255, 103, 55, 0.8);
            text-transform: uppercase;
            letter-spacing: 0.8em;
            opacity: 0;
            z-index: 21;
            font-weight: 100;
        }
        
        .ritual-message.active {
            animation: ritual-text 12s ease-out;
        }
        
        @keyframes ritual-text {
            0%, 100% { 
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }
            50% { 
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
        
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .digit {
                width: 12vw;
                height: 10vh;
            }
            .digit-value {
                font-size: 6vh;
            }
            .separator {
                font-size: 4vh;
                margin: 0 0.3vw;
            }
            .countdown-display {
                gap: 0.3vw;
            }
            .audio-visualizer {
                width: 95vw;
                height: 95vw;
            }
            .bottom-tagline {
                font-size: 1vh;
                padding: 0.3vh 1vw;
            }
        }
    </style>
</head>
<body>
    
    <!-- 网格背景 -->
    <div class="grid-bg"></div>
    
    <!-- 代码雨背景 -->
    <canvas id="matrix-bg"></canvas>
    
    <!-- 轨道系统 -->
    <div class="orbital-system">
        <div class="orbit"></div>
        <div class="orbit"></div>
        <div class="orbit"></div>
    </div>
    
    <!-- 呼吸光晕 -->
    <div class="glow-orb"></div>
    
    <!-- 音频可视化 -->
    <div class="audio-visualizer">
        <div class="wave-circle"></div>
        <div class="wave-circle"></div>
        <div class="wave-circle"></div>
        <svg id="waveform-svg">
            <path class="waveform-path" id="waveform"></path>
            <path class="waveform-path" id="waveform-inner" style="stroke: rgba(255, 103, 55, 0.2); stroke-width: 1.5;"></path>
        </svg>
    </div>
    
    <!-- 火花粒子 -->
    <div id="particles"></div>
    
    <!-- 主倒计时 -->
    <div class="countdown-container">
        <div class="countdown-display">
            <!-- 天数 -->
            <div class="time-unit">
                <div class="digit-group">
                    <div class="digit">
                        <span class="digit-value" id="days-tens">0</span>
                    </div>
                    <div class="digit">
                        <span class="digit-value" id="days-ones">0</span>
                    </div>
                </div>
                <div class="time-label">DAYS</div>
            </div>
            
            <span class="separator">:</span>
            
            <!-- 小时 -->
            <div class="time-unit">
                <div class="digit-group">
                    <div class="digit">
                        <span class="digit-value" id="hours-tens">0</span>
                    </div>
                    <div class="digit">
                        <span class="digit-value" id="hours-ones">0</span>
                    </div>
                </div>
                <div class="time-label">HOURS</div>
            </div>
            
            <span class="separator">:</span>
            
            <!-- 分钟 -->
            <div class="time-unit">
                <div class="digit-group">
                    <div class="digit">
                        <span class="digit-value" id="minutes-tens">0</span>
                    </div>
                    <div class="digit">
                        <span class="digit-value" id="minutes-ones">0</span>
                    </div>
                </div>
                <div class="time-label">MINUTES</div>
            </div>
            
            <span class="separator">:</span>
            
            <!-- 秒数 -->
            <div class="time-unit">
                <div class="digit-group">
                    <div class="digit">
                        <span class="digit-value" id="seconds-tens">0</span>
                    </div>
                    <div class="digit">
                        <span class="digit-value" id="seconds-ones">0</span>
                    </div>
                </div>
                <div class="time-label">SECONDS</div>
            </div>
        </div>
        
        <!-- 毫秒显示 -->
        <div class="milliseconds" id="milliseconds">.000</div>
    </div>
    
    <!-- 进度条 -->
    <div class="progress-bar">
        <div class="progress-fill" id="progress"></div>
    </div>
    
    <!-- 底部标语 -->
    <div class="bottom-tagline completion-message" id="completionMessage">
        <span class="highlight">S5</span> <span class="muted">Chapter has come to an end</span>
    </div>
    <!-- 常驻标语：文案固定，仅随 body 黑/白主题改色；脚本永不改此节点内容；终态只显示上方 #completionMessage -->
    <div class="bottom-tagline" id="residencyTagline">
        <span class="sparklab-city">sparklab.city</span> of Artist · Hacker · Builder
    </div>
    
    <!-- 左上角进度条组件 - Community Dinner -->
    <div class="community-dinner-progress">
        <div class="community-dinner-date-row">
            <div class="community-dinner-date" id="communityDinnerDate"></div>
            <div class="community-dinner-countdown" id="communityDinnerCountdown"></div>
        </div>
        <div class="community-dinner-bar-container">
            <div class="community-dinner-bar-fill" id="communityDinnerProgress"></div>
            <div class="community-dinner-progress-marker" id="communityDinnerMarker"></div>
        </div>
        <div class="community-dinner-label">Ship it Monday</div>
    </div>
    
    <!-- 生命体征 -->
    <div class="vitals-indicator">
        <span>SPARK PULSE <span id="heartRate">72</span> BPM<span class="pulse-dot"></span></span>
        <span>ACTIVITY <span id="activity">NORMAL</span></span>
        <span>COMMITS TODAY <span id="commits" class="glitch-text">0</span></span>
    </div>
    
    <!-- 21:00 仪式覆盖层 -->
    <div class="ritual-overlay" id="ritualOverlay"></div>
    <div class="ritual-message" id="ritualMessage">KEEP BUILDING</div>
    
    <script>
        // === 时间锚点：硬编码 UTC 时间戳，无需任何 ISO 解析或 locale 支持 ===
        // 2026-04-26 12:00 Shanghai (UTC+8) = 2026-04-26 04:00 UTC
        const START_TS = 1777176000000;
        // 2026-06-07 12:00 Shanghai (UTC+8) = 2026-06-07 04:00 UTC
        const END_TS   = 1780804800000;
        const MS_PER_DAY = 86400000;

        const CONFIG = {
            sparkWords: ['BUILD', 'CREATE', 'SPARK', 'LEGACY', 'ITERATE', 'SHIP', 'SCALE', 'DREAM'],
            matrixSpeed: 50,
            ritualHour: 21,
            ritualMessages: [
                'KEEP BUILDING', 'STAY CURIOUS', 'TRUST THE PROCESS',
                'EMBRACE CHAOS', 'FIND YOUR SPARK', 'BUILD TO THINK', 'SHIP FAST', 'STAY HUNGRY'
            ],
            particleInterval: 8000
        };

        let countdownFinished = false;

        // === UTC+8 工具函数：纯算术，不依赖 Intl / toLocaleString ===
        function getShanghaiParts(tsMs) {
            const s = new Date(tsMs + 8 * 3600000);
            return {
                year:    s.getUTCFullYear(),
                month:   s.getUTCMonth() + 1,
                day:     s.getUTCDate(),
                hour:    s.getUTCHours(),
                minute:  s.getUTCMinutes(),
                second:  s.getUTCSeconds(),
                weekday: s.getUTCDay()
            };
        }

        function pad2(n) { return n < 10 ? '0' + n : '' + n; }
        function pad3(n) { const s = '' + n; return s.length >= 3 ? s : ('000' + s).slice(-3); }

        function setEl(id, v) {
            const el = document.getElementById(id);
            if (el) el.textContent = v;
        }

        // === Matrix 代码雨 ===
        function initMatrix() {
            const canvas = document.getElementById('matrix-bg');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const matrix = CONFIG.sparkWords.join('').split('');
            const fontSize = 14;
            const drops = Array(Math.floor(canvas.width / fontSize)).fill(1);
            setInterval(function() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.02)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'rgba(255, 103, 55, 0.8)';
                ctx.font = fontSize + 'px Fira Code';
                for (let i = 0; i < drops.length; i++) {
                    ctx.fillText(matrix[Math.floor(Math.random() * matrix.length)], i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.985) drops[i] = 0;
                    drops[i]++;
                }
            }, CONFIG.matrixSpeed);
        }

        // === 波形 ===
        function updateWaveform() {
            const svg = document.getElementById('waveform-svg');
            const path = document.getElementById('waveform');
            const innerPath = document.getElementById('waveform-inner');
            const width = svg.clientWidth, height = svg.clientHeight;
            const cx = width / 2, cy = height / 2;
            const radius = Math.min(width, height) * 0.35;
            const points = 64;
            let pd = '', ipd = '';
            const time = Date.now() * 0.0003;
            for (let i = 0; i <= points; i++) {
                const angle = (i / points) * Math.PI * 2;
                let wh = 8 + Math.sin(time + i * 0.05) * 4 + Math.sin(time * 2 + i * 0.1) * 2;
                if (Math.sin(time * 0.5) > 0.8) wh += Math.sin(time * 4 + i * 0.2) * 6;
                const r = radius + wh;
                const x = cx + Math.cos(angle) * r, y = cy + Math.sin(angle) * r;
                const ir = radius - 5 + wh * 0.5;
                const ix = cx + Math.cos(angle) * ir, iy = cy + Math.sin(angle) * ir;
                pd  += (i === 0 ? 'M ' : ' L ') + x + ' ' + y;
                ipd += (i === 0 ? 'M ' : ' L ') + ix + ' ' + iy;
            }
            path.setAttribute('d', pd + ' Z');
            innerPath.setAttribute('d', ipd + ' Z');
            requestAnimationFrame(updateWaveform);
        }

        // === 粒子 ===
        function createParticle() {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = (window.innerWidth / 2 + (Math.random() - 0.5) * 300) + 'px';
            p.style.top  = (window.innerHeight / 2 + (Math.random() - 0.5) * 300) + 'px';
            p.style.setProperty('--tx', ((Math.random() - 0.5) * 200) + 'px');
            p.style.setProperty('--ty', (-Math.random() * 150 - 50) + 'px');
            document.getElementById('particles').appendChild(p);
            setTimeout(function() { p.remove(); }, 15000);
        }

        // === 仪式 ===
        function triggerRitual() {
            const overlay = document.getElementById('ritualOverlay');
            const message = document.getElementById('ritualMessage');
            if (!overlay || !message) return;
            message.textContent = CONFIG.ritualMessages[Math.floor(Math.random() * CONFIG.ritualMessages.length)];
            overlay.classList.add('active');
            message.classList.add('active');
            for (let i = 0; i < 20; i++) setTimeout(createParticle, i * 100);
            setTimeout(function() {
                overlay.classList.remove('active');
                message.classList.remove('active');
            }, 12000);
        }

        // === 打字机 ===
        let typewriterState = {
            currentText: 'Spark it forward', fullText: 'Spark it forward',
            isDeleting: false, isRotating: false, rotateIndex: 0, typewriterTimeout: null
        };
        const rotateWords = ['Stealth', 'Speed', 'Subtraction', 'Synergy'];
        function updateTypewriterEffect() {
            const el = document.getElementById('activity');
            if (!el) return;
            if (typewriterState.typewriterTimeout) clearTimeout(typewriterState.typewriterTimeout);
            if (typewriterState.isRotating) {
                if (typewriterState.rotateIndex < rotateWords.length) {
                    el.textContent = rotateWords[typewriterState.rotateIndex++];
                    typewriterState.typewriterTimeout = setTimeout(updateTypewriterEffect, 1500);
                } else {
                    typewriterState.isRotating = false; typewriterState.rotateIndex = 0; typewriterState.isDeleting = false;
                    updateTypewriterEffect();
                }
            } else if (!typewriterState.isDeleting) {
                el.textContent = typewriterState.currentText = typewriterState.fullText;
                typewriterState.typewriterTimeout = setTimeout(function() { typewriterState.isDeleting = true; updateTypewriterEffect(); }, 2000);
            } else {
                if (typewriterState.currentText.length > 5) {
                    el.textContent = typewriterState.currentText = typewriterState.currentText.slice(0, -1);
                    typewriterState.typewriterTimeout = setTimeout(updateTypewriterEffect, 80);
                } else {
                    typewriterState.isDeleting = false; typewriterState.isRotating = true; typewriterState.rotateIndex = 0;
                    typewriterState.typewriterTimeout = setTimeout(updateTypewriterEffect, 1000);
                }
            }
        }

        // === 生命体征 ===
        function updateVitals() {
            setEl('heartRate', 60 + Math.floor(Math.random() * 30));
            const ce = document.getElementById('commits');
            if (ce) {
                if (Math.random() > 0.95) ce.textContent = (parseInt(ce.textContent, 10) || 0) + 1;
                if (Math.random() > 0.8) { ce.classList.add('glitching'); setTimeout(function() { ce.classList.remove('glitching'); }, 300); }
            }
        }

        // === Ship it Monday 进度（纯 UTC+8 算术）===
        function getMonday1830UTC(now) {
            const todayMidSh = Math.floor((now + 8 * 3600000) / MS_PER_DAY) * MS_PER_DAY - 8 * 3600000;
            const dow = new Date(todayMidSh + 8 * 3600000).getUTCDay(); // 0=Sun
            const daysSinceMon = (dow + 6) % 7;
            return todayMidSh - daysSinceMon * MS_PER_DAY + (18 * 60 + 30) * 60000;
        }

        function updateShipItMonday() {
            try {
                const now = Date.now();
                let wStart = getMonday1830UTC(now);
                if (now < wStart) wStart -= 7 * MS_PER_DAY;
                const wEnd = wStart + 7 * MS_PER_DAY;
                const pct = Math.min(100, Math.max(0, (now - wStart) / (7 * MS_PER_DAY) * 100));
                const rem = Math.max(0, wEnd - now);
                const pb = document.getElementById('communityDinnerProgress');
                const pm = document.getElementById('communityDinnerMarker');
                const de = document.getElementById('communityDinnerDate');
                const ce = document.getElementById('communityDinnerCountdown');
                const cont = pb ? pb.parentElement : null;
                if (pb) pb.style.width = pct + '%';
                if (pm && cont) pm.style.left = (cont.offsetWidth * pct / 100) + 'px';
                if (de) {
                    const sp = getShanghaiParts(wEnd);
                    const mo = ['Jan.','Feb.','Mar.','Apr.','May','Jun.','Jul.','Aug.','Sep.','Oct.','Nov.','Dec.'];
                    de.textContent = mo[sp.month - 1] + ' ' + sp.day;
                }
                if (ce) {
                    const d = Math.floor(rem / MS_PER_DAY);
                    const h = Math.floor((rem % MS_PER_DAY) / 3600000);
                    const m = Math.floor((rem % 3600000) / 60000);
                    const s = Math.floor((rem % 60000) / 1000);
                    ce.textContent = d > 0 ? d + 'd ' + pad2(h) + ':' + pad2(m) + ':' + pad2(s) : pad2(h) + ':' + pad2(m) + ':' + pad2(s);
                }
            } catch (e) {}
        }

        // === 主倒计时：直接同步更新 DOM，全局 try-catch ===
        function updateCountdown() {
            try {
                const now = Date.now();
                const remaining = END_TS - now;
                const elapsed   = now - START_TS;
                const total     = END_TS - START_TS;
                const isOutside = now < START_TS || now >= END_TS;
                const FLICKER   = 10000;
                const inFlicker = Math.abs(now - START_TS) <= FLICKER || Math.abs(now - END_TS) <= FLICKER;

                if (inFlicker) {
                    document.body.classList.add('countdown-flicker');
                    document.body.classList.toggle('countdown-inactive', Math.floor(now / 1000) % 2 === 0);
                } else {
                    document.body.classList.remove('countdown-flicker');
                    document.body.classList.toggle('countdown-inactive', isOutside);
                }

                if (remaining <= 0) {
                    if (!countdownFinished) {
                        ['days-tens','days-ones','hours-tens','hours-ones',
                         'minutes-tens','minutes-ones','seconds-tens','seconds-ones'].forEach(function(id) { setEl(id, '0'); });
                        setEl('milliseconds', '.000');
                        const prog = document.getElementById('progress');
                        if (prog) prog.style.width = '100%';
                        const comp = document.getElementById('completionMessage');
                        if (comp) comp.style.display = 'block';
                        countdownFinished = true;
                    }
                    return;
                }

                const hoursLeft = remaining / 3600000;
                if (hoursLeft <= 24) {
                    document.documentElement.style.setProperty('--glow-intensity', '0.8');
                    if (hoursLeft <= 1) document.documentElement.style.setProperty('--main-color', '#ff4520');
                }

                const days    = Math.floor(remaining / MS_PER_DAY);
                const hours   = Math.floor((remaining % MS_PER_DAY) / 3600000);
                const minutes = Math.floor((remaining % 3600000) / 60000);
                const seconds = Math.floor((remaining % 60000) / 1000);
                const millis  = remaining % 1000;

                // 直接同步更新，无 setTimeout 延迟，无类型比较问题
                setEl('days-tens',    Math.floor(days / 10));
                setEl('days-ones',    days % 10);
                setEl('hours-tens',   Math.floor(hours / 10));
                setEl('hours-ones',   hours % 10);
                setEl('minutes-tens', Math.floor(minutes / 10));
                setEl('minutes-ones', minutes % 10);
                setEl('seconds-tens', Math.floor(seconds / 10));
                setEl('seconds-ones', seconds % 10);
                setEl('milliseconds', '.' + pad3(Math.floor(millis / 10) * 10));

                const pct = total > 0 ? Math.min(100, Math.max(0, elapsed / total * 100)) : 0;
                const progEl = document.getElementById('progress');
                if (progEl) progEl.style.width = pct + '%';

                if (minutes === 0 && seconds === 0 && millis < 200) {
                    for (let i = 0; i < 5; i++) setTimeout(createParticle, i * 200);
                }

                const sp = getShanghaiParts(now);
                if (sp.hour === CONFIG.ritualHour && sp.minute === 0 && sp.second < 2) triggerRitual();

            } catch (e) {
                // 任何错误都不能杀死倒计时循环
            }
        }

        // === 窗口缩放 ===
        window.addEventListener('resize', function() {
            const canvas = document.getElementById('matrix-bg');
            if (canvas) { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        });

        // === 启动 ===
        initMatrix();
        updateWaveform();
        setInterval(createParticle, CONFIG.particleInterval);
        setInterval(updateCountdown, 100);
        setInterval(updateVitals, 3000);
        setInterval(updateShipItMonday, 1000);
        updateShipItMonday();
        updateTypewriterEffect();
        updateCountdown();

        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') { e.preventDefault(); triggerRitual(); }
        });
    </script>
</body>
</html>
