<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S5 Residency Countdown | Spark Lab</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;200;400;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&display=swap');
        
        @font-face {
            font-family: 'Impact';
            src: local('Impact'), local('Impact MT');
        }
        
        :root {
            --main-color: #ff6737;
            --glow-intensity: 0.6;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            background: #000000;
            color: #ffffff;
            overflow: hidden;
            position: relative;
            width: 100vw;
            height: 100vh;
            cursor: none;
            font-variant-numeric: slashed-zero;
            font-feature-settings: "zero" 1;
            transition: background 1s ease;
        }
        
        body.countdown-inactive {
            background: #ffffff;
        }

        /* 起止前后各 10s（共 20s 窗口）：每秒黑/白切换一次，短时过渡避免与 1s 淡入淡出糊在一起 */
        body.countdown-flicker {
            transition: background 0.05s linear, color 0.05s linear;
        }
        
        /* 自定义光标 - 更柔和 */
        .cursor {
            width: 24px;
            height: 24px;
            border: 0.5px solid rgba(255, 103, 55, 0.3);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.15s ease;
            mix-blend-mode: screen;
        }
        
        /* 背景层 - 代码雨效果 */
        #matrix-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.02;
            pointer-events: none;
        }
        
        /* 轨道系统 */
        .orbital-system {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        
        .orbit {
            position: absolute;
            border: 1px solid rgba(255, 103, 55, 0.08);
            border-radius: 50%;
            animation: rotate 120s linear infinite;
        }
        
        .orbit:nth-child(1) {
            width: 30vw;
            height: 30vw;
            animation-duration: 90s;
        }
        
        .orbit:nth-child(2) {
            width: 50vw;
            height: 50vw;
            animation-duration: 120s;
            animation-direction: reverse;
        }
        
        .orbit:nth-child(3) {
            width: 70vw;
            height: 70vw;
            animation-duration: 180s;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* 音频可视化波形环 - 更凝实的设计 */
        .audio-visualizer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vw;
            max-width: 80vh;
            max-height: 80vh;
            pointer-events: none;
            z-index: 5;
        }
        
        .wave-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid rgba(255, 103, 55, 0.1);
            border-radius: 50%;
            opacity: 0;
            animation: wave-pulse 6s ease-out infinite;
        }
        
        .wave-circle:nth-child(2) {
            animation-delay: 1.5s;
            border-width: 2px;
        }
        
        .wave-circle:nth-child(3) {
            animation-delay: 3s;
            border-width: 1px;
        }
        
        @keyframes wave-pulse {
            0% {
                transform: scale(0.85);
                opacity: 0;
                border-color: rgba(255, 103, 55, 0.4);
            }
            20% {
                opacity: 0.8;
                border-color: rgba(255, 103, 55, 0.3);
            }
            100% {
                transform: scale(1.3);
                opacity: 0;
                border-color: rgba(255, 103, 55, 0);
            }
        }
        
        /* SVG波形路径 - 更厚实 */
        #waveform-svg {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 6;
        }
        
        .waveform-path {
            fill: none;
            stroke: rgba(255, 103, 55, 0.4);
            stroke-width: 3;
            stroke-linecap: round;
            filter: none;
        }
        
        /* 主倒计时容器 */
        .countdown-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
        }
        
        /* 倒计时数字组 */
        .countdown-display {
            display: flex;
            gap: 0.4vw;
            justify-content: center;
            align-items: center;
            margin-bottom: 2vh;
        }
        
        /* 时间单元 */
        .time-unit {
            position: relative;
        }
        
        /* 数字样式 - 核心设计 */
        .digit-group {
            display: flex;
            gap: 0.1vw;
            position: relative;
        }
        
        .digit {
            width: 7.5vw;
            height: 14vh;
            position: relative;
            background: linear-gradient(135deg, rgba(255, 103, 55, 0.02), transparent);
            border: 0.5px solid rgba(255, 103, 55, 0.1);
            box-shadow: inset 0 0 20px rgba(255, 103, 55, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .digit-value {
    font-size: 14vh;
            font-weight: normal;
            font-family: 'Impact', 'Arial Black', sans-serif;
            color: var(--main-color);
            text-shadow: 
                0 0 30px rgba(255, 103, 55, var(--glow-intensity)),
                0 0 60px rgba(255, 103, 55, 0.3);
            position: relative;
            z-index: 2;
            font-variant-numeric: slashed-zero;
            font-feature-settings: "zero" 1;
            transition: opacity 0.6s ease, color 0.5s ease;
        }
        
        /* 数字变化时的平滑过渡 */
        .digit.changing .digit-value {
            opacity: 0.7;
        }
        
        /* 移除脉动，保持稳定 */
        
        /* 分隔符 - 缓慢的呼吸感 */
        .separator {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 6vh;
            color: rgba(255, 103, 55, 0.5);
            margin: 0 0.4vw;
            animation: blink 3s ease-in-out infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.3; }
        }
        
        /* 时间标签 - 更清晰 */
        .time-label {
            font-size: 1.3vh;
            color: rgba(255, 255, 255, 0.25);
            text-transform: uppercase;
            letter-spacing: 0.25em;
            margin-top: 1.5vh;
            font-weight: 100;
            font-family: 'Fira Code', monospace;
        }
        
        /* 左上角进度条组件 - Community Dinner */
        .community-dinner-progress {
            position: absolute;
            top: 5vh;
            left: 5vw;
            z-index: 15;
            display: flex;
            flex-direction: column;
            gap: 0.6vh;
        }
        
        .community-dinner-date-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 20vw;
        }
        
        .community-dinner-date {
            font-family: 'Cinzel', serif;
            font-size: 0.9vh;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.1em;
            font-weight: 500;
        }
        
        .community-dinner-bar-container {
            position: relative;
            width: 20vw;
            height: 2px;
            border: 0.5px solid rgba(255, 103, 55, 0.15);
            background: rgba(255, 103, 55, 0.03);
            overflow: visible;
        }
        
        .community-dinner-bar-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 2px;
            background: rgba(200, 80, 40, 0.7);
            transition: width 1s ease;
            min-width: 0;
        }
        
        .community-dinner-progress-marker {
            position: absolute;
            top: 50%;
            left: 0; /* 初始位置 */
            transform: translate(-50%, -50%);
            width: 1.5px;
            height: 10px;
            background: rgba(255, 255, 255, 0.4);
            z-index: 2;
        }
        
        .community-dinner-label {
            font-family: 'Cinzel', serif;
            font-size: 1.45vh;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 500;
        }
        
        .community-dinner-countdown {
            font-family: 'Cinzel', serif;
            font-size: 0.9vh;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.1em;
            font-weight: 500;
        }
        
        /* 进度条 - 更低调 */
        .progress-bar {
            position: absolute;
            bottom: 5vh;
            left: 50%;
            transform: translateX(-50%);
            width: 60vw;
            height: 0.5px;
            background: rgba(255, 103, 55, 0.05);
            display: none; /* 隐藏底部橙色直线 */
        }
        
        .progress-fill {
            height: 100%;
            background: rgba(255, 103, 55, 0.3);
            transition: width 1s linear;
        }
        
        /* 底部标语 */
        .bottom-tagline {
            position: absolute;
            bottom: 2.5vh;
            left: 50%;
            transform: translateX(-50%);
            font-family: Georgia, serif;
            font-style: italic;
            font-size: 1.6vh;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 0.08em;
            white-space: nowrap;
            text-shadow: 0 0 10px rgba(255, 103, 55, 0.2);
            padding: 0.5vh 2vw;
        }
        
        .bottom-tagline .sparklab-city {
            color: var(--main-color);
            text-shadow: 0 0 10px rgba(255, 103, 55, 0.4);
        }

        body.countdown-inactive .bottom-tagline:not(.completion-message) {
            color: rgba(0, 0, 0, 0.68);
            text-shadow: none;
        }

        body.countdown-inactive .bottom-tagline:not(.completion-message) .sparklab-city {
            color: #ed743d;
            text-shadow: none;
        }

        /* 白底（未开始/已结束）：左上角 Ship it Monday 组件反色对比 */
        body.countdown-inactive .community-dinner-date,
        body.countdown-inactive .community-dinner-label,
        body.countdown-inactive .community-dinner-countdown {
            color: rgba(0, 0, 0, 0.58);
            font-weight: 500;
        }

        body.countdown-inactive .community-dinner-bar-container {
            border-color: rgba(0, 0, 0, 0.18);
            background: rgba(0, 0, 0, 0.05);
        }

        body.countdown-inactive .community-dinner-bar-fill {
            background: rgba(255, 103, 55, 0.6);
        }

        body.countdown-inactive .community-dinner-progress-marker {
            background: rgba(0, 0, 0, 0.45);
        }

        /* 白底：右上角字重微增；同原橙色系略提亮度便于白底阅读 */
        body.countdown-inactive .vitals-indicator {
            color: rgba(255, 103, 55, 0.45);
            font-weight: 400;
        }

        body.countdown-inactive .vitals-indicator .glitch-text {
            color: rgba(255, 103, 55, 0.52);
        }

        body.countdown-inactive .vitals-indicator .pulse-dot {
            background: rgba(255, 103, 55, 0.72);
        }
        
        .completion-message {
            bottom: 5vh;
            display: none;
        }
        
        .completion-message .highlight {
            color: var(--main-color);
        }
        
        /* 火花粒子容器 */
        #particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 103, 55, 0.6);
            border-radius: 50%;
            pointer-events: none;
            animation: float 15s ease-out forwards;
            filter: blur(0.5px);
        }
        
        @keyframes float {
            0% {
                opacity: 0;
                transform: translate(0, 0) scale(0);
            }
            10% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0.5);
            }
        }
        
        /* 呼吸光晕 - 更缓慢的节奏 */
        .glow-orb {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 45vw;
            height: 45vw;
            background: radial-gradient(circle, rgba(255, 103, 55, 0.08), transparent 70%);
            animation: breathe 6s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
        }
        
        @keyframes breathe {
            0%, 100% {
                transform: translate(-50%, -50%) scale(0.95);
                opacity: 0.4;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.05);
                opacity: 0.7;
            }
        }
        
        /* Grid 网格背景 - 缓慢移动 */
        .grid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 103, 55, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 103, 55, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: grid-move 30s linear infinite;
        }
        
        @keyframes grid-move {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        
        /* 毫秒显示 - 稍微亮一点 */
        .milliseconds {
            position: absolute;
            bottom: -3vh;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2vh;
            color: rgba(255, 103, 55, 0.2);
            font-weight: 100;
            letter-spacing: 0.1em;
        }
        
        /* 生命体征指示器 - 稍微亮一点 */
        .vitals-indicator {
            position: absolute;
            top: 5vh;
            right: 5vw;
            font-size: 1.2vh;
            color: rgba(255, 103, 55, 0.35);
            text-align: right;
            font-weight: 400;
            letter-spacing: 0.1em;
        }
        
        .vitals-indicator span {
            display: block;
            margin: 0.5vh 0;
        }
        
        .pulse-dot {
            display: inline-block;
            width: 4px;
            height: 4px;
            background: rgba(255, 103, 55, 0.6);
            border-radius: 50%;
            margin-left: 5px;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        
        @keyframes pulse-dot {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }
        
        /* Glitch效果 for commits */
        .glitch-text {
            position: relative;
            display: inline-block;
            color: rgba(255, 103, 55, 0.4);
        }
        
        .glitch-text.glitching {
            animation: glitch-flicker 0.3s ease;
        }
        
        @keyframes glitch-flicker {
            0%, 100% { 
                opacity: 1;
                transform: translateX(0);
            }
            20% { 
                opacity: 0.8;
                transform: translateX(-1px);
            }
            40% { 
                opacity: 0.6;
                transform: translateX(1px);
            }
            60% { 
                opacity: 0.9;
                transform: translateX(-0.5px);
            }
        }
        
        /* 21:00 仪式效果 - 更内敛 */
        .ritual-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent, rgba(255, 103, 55, 0.1));
            opacity: 0;
            pointer-events: none;
            z-index: 20;
        }
        
        .ritual-overlay.active {
            animation: ritual-pulse 12s ease-out;
        }
        
        @keyframes ritual-pulse {
            0% { opacity: 0; }
            10% { opacity: 0.8; }
            100% { opacity: 0; }
        }
        
        .ritual-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.8vh;
            color: rgba(255, 103, 55, 0.8);
            text-transform: uppercase;
            letter-spacing: 0.8em;
            opacity: 0;
            z-index: 21;
            font-weight: 100;
        }
        
        .ritual-message.active {
            animation: ritual-text 12s ease-out;
        }
        
        @keyframes ritual-text {
            0%, 100% { 
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }
            50% { 
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
        
        /* 声音控制按钮 - 更简洁 */
        .sound-toggle {
            position: fixed;
            bottom: 5vh;
            right: 5vw;
            width: 36px;
            height: 36px;
            background: rgba(255, 103, 55, 0.05);
            border: 0.5px solid rgba(255, 103, 55, 0.2);
            border-radius: 50%;
            cursor: pointer !important;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: all 0.3s ease;
            opacity: 0.5;
        }
        
        .sound-toggle:hover {
            background: rgba(255, 103, 55, 0.1);
            transform: scale(1.05);
            opacity: 1;
        }
        
        .sound-toggle.muted::after {
            content: '🔇';
            font-size: 16px;
        }
        
        .sound-toggle.unmuted::after {
            content: '🔊';
            font-size: 16px;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .digit {
                width: 12vw;
                height: 10vh;
            }
            .digit-value {
                font-size: 6vh;
            }
            .separator {
                font-size: 4vh;
                margin: 0 0.3vw;
            }
            .countdown-display {
                gap: 0.3vw;
            }
            .audio-visualizer {
                width: 95vw;
                height: 95vw;
            }
            .bottom-tagline {
                font-size: 1vh;
                padding: 0.3vh 1vw;
            }
        }
    </style>
</head>
<body>
    <!-- 自定义光标 -->
    <div class="cursor"></div>
    
    <!-- 网格背景 -->
    <div class="grid-bg"></div>
    
    <!-- 代码雨背景 -->
    <canvas id="matrix-bg"></canvas>
    
    <!-- 轨道系统 -->
    <div class="orbital-system">
        <div class="orbit"></div>
        <div class="orbit"></div>
        <div class="orbit"></div>
    </div>
    
    <!-- 呼吸光晕 -->
    <div class="glow-orb"></div>
    
    <!-- 音频可视化 -->
    <div class="audio-visualizer">
        <div class="wave-circle"></div>
        <div class="wave-circle"></div>
        <div class="wave-circle"></div>
        <svg id="waveform-svg">
            <path class="waveform-path" id="waveform"></path>
            <path class="waveform-path" id="waveform-inner" style="stroke: rgba(255, 103, 55, 0.2); stroke-width: 1.5;"></path>
        </svg>
    </div>
    
    <!-- 火花粒子 -->
    <div id="particles"></div>
    
    <!-- 主倒计时 -->
    <div class="countdown-container">
        <div class="countdown-display">
            <!-- 天数 -->
            <div class="time-unit">
                <div class="digit-group">
                    <div class="digit">
                        <span class="digit-value" id="days-tens">0</span>
                    </div>
                    <div class="digit">
                        <span class="digit-value" id="days-ones">0</span>
                    </div>
                </div>
                <div class="time-label">DAYS</div>
            </div>
            
            <span class="separator">:</span>
            
            <!-- 小时 -->
            <div class="time-unit">
                <div class="digit-group">
                    <div class="digit">
                        <span class="digit-value" id="hours-tens">0</span>
                    </div>
                    <div class="digit">
                        <span class="digit-value" id="hours-ones">0</span>
                    </div>
                </div>
                <div class="time-label">HOURS</div>
            </div>
            
            <span class="separator">:</span>
            
            <!-- 分钟 -->
            <div class="time-unit">
                <div class="digit-group">
                    <div class="digit">
                        <span class="digit-value" id="minutes-tens">0</span>
                    </div>
                    <div class="digit">
                        <span class="digit-value" id="minutes-ones">0</span>
                    </div>
                </div>
                <div class="time-label">MINUTES</div>
            </div>
            
            <span class="separator">:</span>
            
            <!-- 秒数 -->
            <div class="time-unit">
                <div class="digit-group">
                    <div class="digit">
                        <span class="digit-value" id="seconds-tens">0</span>
                    </div>
                    <div class="digit">
                        <span class="digit-value" id="seconds-ones">0</span>
                    </div>
                </div>
                <div class="time-label">SECONDS</div>
            </div>
        </div>
        
        <!-- 毫秒显示 -->
        <div class="milliseconds" id="milliseconds">.000</div>
    </div>
    
    <!-- 进度条 -->
    <div class="progress-bar">
        <div class="progress-fill" id="progress"></div>
    </div>
    
    <!-- 底部标语 -->
    <div class="bottom-tagline completion-message" id="completionMessage">
        <span class="highlight">S5</span> <span class="muted">Chapter has come to an end</span>
    </div>
    <!-- 常驻标语：文案固定，仅随 body 黑/白主题改色；脚本永不改此节点内容；终态只显示上方 #completionMessage -->
    <div class="bottom-tagline" id="residencyTagline">
        <span class="sparklab-city">sparklab.city</span> of Artist · Hacker · Builder
    </div>
    
    <!-- 左上角进度条组件 - Community Dinner -->
    <div class="community-dinner-progress">
        <div class="community-dinner-date-row">
            <div class="community-dinner-date" id="communityDinnerDate"></div>
            <div class="community-dinner-countdown" id="communityDinnerCountdown"></div>
        </div>
        <div class="community-dinner-bar-container">
            <div class="community-dinner-bar-fill" id="communityDinnerProgress"></div>
            <div class="community-dinner-progress-marker" id="communityDinnerMarker"></div>
        </div>
        <div class="community-dinner-label">Ship it Monday</div>
    </div>
    
    <!-- 生命体征 -->
    <div class="vitals-indicator">
        <span>SPARK PULSE <span id="heartRate">72</span> BPM<span class="pulse-dot"></span></span>

    <!-- 声音控制 - 隐藏 -->

    <script>
        // 配置：主倒计时墙钟 = 上海（+08:00 固定；上海无夏令时）
        // 本期 S5 起止均为上海中午 12:00：2026-04-26 12:00 起 → 满 42 天后的同日时刻止（即 2026-06-07 12:00）。边界 ±10s 闪烁、白/黑底、停表，均只读 CONFIG.startDate / endDate，无第二套时间。
        // 若 ISO 在极古环境中解析失败，则回退为【本机本地日历】同一天的 12:00 与 +42 天（console 警告，行为退化为 S3 式本地锚点）
        const TZ_SHANGHAI = 'Asia/Shanghai';
        const MS_PER_DAY = 86400000;

        let startDateShanghai = new Date('2026-04-26T12:00:00+08:00');
        if (Number.isNaN(startDateShanghai.getTime())) {
            console.warn('[S5] 无法解析起止 ISO，已回退为本地 2026-4-26 12:00 与 +42 天');
            startDateShanghai = new Date(2026, 3, 26, 12, 0, 0, 0);
        }
        const endDateShanghai = new Date(startDateShanghai.getTime() + 42 * MS_PER_DAY);

        const totalDays = (endDateShanghai.getTime() - startDateShanghai.getTime()) / MS_PER_DAY;
        console.log(
            `S5 倒计时周期: ${totalDays} 天 (预期: 42) | 上海起 ${startDateShanghai.toLocaleString('sv-SE', { timeZone: TZ_SHANGHAI })} | 止 ${endDateShanghai.toLocaleString('sv-SE', { timeZone: TZ_SHANGHAI })}`
        );

        const CONFIG = {
            timeZone: TZ_SHANGHAI,
            startDate: startDateShanghai,
            endDate: endDateShanghai,
            sparkWords: ['BUILD', 'CREATE', 'SPARK', 'LEGACY', 'ITERATE', 'SHIP', 'SCALE', 'DREAM'],
            particleInterval: 8000, // 粒子生成间隔
            matrixSpeed: 50, // 代码雨速度
            soundEnabled: true, // 声音默认开启
            ritualHour: 21, // 21:00仪式时刻
            ritualMessages: [
                'KEEP BUILDING',
                'STAY CURIOUS',
                'TRUST THE PROCESS',
                'EMBRACE CHAOS',
                'FIND YOUR SPARK',
                'BUILD TO THINK',
                'SHIP FAST',
                'STAY HUNGRY'
            ]
        };
        
        let countdownInterval = null;
        let countdownFinished = false;
        
        // Web Audio API 声音引擎
        class SoundEngine {
            constructor() {
                this.context = null;
                this.oscillator = null;
                this.gainNode = null;
                this.analyser = null;
                this.dataArray = null;
                this.initialized = false;
            }
            
            init() {
                if (this.initialized) return;
                
                this.context = new (window.AudioContext || window.webkitAudioContext)();
                this.gainNode = this.context.createGain();
                this.gainNode.gain.value = 0.005; // 更低的音量
                this.gainNode.connect(this.context.destination);
                
                // 分析器用于可视化
                this.analyser = this.context.createAnalyser();
                this.analyser.fftSize = 256;
                this.dataArray = new Uint8Array(this.analyser.frequencyBinCount);
                
                this.initialized = true;
            }
            
            // Tick声音 - 更轻柔
            playTick() {
                if (!this.initialized || !CONFIG.soundEnabled) return;
                
                const osc = this.context.createOscillator();
                const gain = this.context.createGain();
                
                osc.frequency.value = 600 + Math.random() * 50; // 更低的频率
                osc.type = 'sine';
                
                gain.gain.setValueAtTime(0, this.context.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, this.context.currentTime + 0.001);
                gain.gain.exponentialRampToValueAtTime(0.0001, this.context.currentTime + 0.03);
                
                osc.connect(gain);
                gain.connect(this.gainNode);
                gain.connect(this.analyser);
                
                osc.start(this.context.currentTime);
                osc.stop(this.context.currentTime + 0.03);
            }
            
            // 整点钟声 - 更轻柔
            playHourChime() {
                if (!this.initialized || !CONFIG.soundEnabled) return;
                
                const frequencies = [523.25, 659.25, 783.99]; // C, E, G
                
                frequencies.forEach((freq, i) => {
                    setTimeout(() => {
                        const osc = this.context.createOscillator();
                        const gain = this.context.createGain();
                        
                        osc.frequency.value = freq;
                        osc.type = 'triangle';
                        
                        gain.gain.setValueAtTime(0, this.context.currentTime);
                        gain.gain.linearRampToValueAtTime(0.03, this.context.currentTime + 0.1);
                        gain.gain.exponentialRampToValueAtTime(0.0001, this.context.currentTime + 0.8);
                        
                        osc.connect(gain);
                        gain.connect(this.gainNode);
                        
                        osc.start(this.context.currentTime);
                        osc.stop(this.context.currentTime + 0.8);
                    }, i * 200);
                });
            }
            
            // 21:00仪式声音 - 深沉但不刺耳
            playRitualSound() {
                if (!this.initialized || !CONFIG.soundEnabled) return;
                
                // 深沉的共振音
                const baseFreq = 110; // A2
                
                for (let i = 0; i < 3; i++) {
                    const osc = this.context.createOscillator();
                    const gain = this.context.createGain();
                    
                    osc.frequency.value = baseFreq * (i + 1);
                    osc.type = 'sine';
                    
                    gain.gain.setValueAtTime(0, this.context.currentTime);
                    gain.gain.linearRampToValueAtTime(0.02, this.context.currentTime + 2);
                    gain.gain.linearRampToValueAtTime(0, this.context.currentTime + 5);
                    
                    osc.connect(gain);
                    gain.connect(this.gainNode);
                    
                    osc.start(this.context.currentTime);
                    osc.stop(this.context.currentTime + 5);
                }
            }
            
            // 获取音频数据用于可视化
            getFrequencyData() {
                if (!this.analyser) return null;
                this.analyser.getByteFrequencyData(this.dataArray);
                return this.dataArray;
            }
            
            // 生成环境音
            startAmbient() {
                if (!this.initialized || !CONFIG.soundEnabled) return;
                
                // 低频环境噪音
                const bufferSize = this.context.sampleRate * 2;
                const buffer = this.context.createBuffer(1, bufferSize, this.context.sampleRate);
                const data = buffer.getChannelData(0);
                
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() - 0.5) * 0.0005;
                }
                
                const source = this.context.createBufferSource();
                const filter = this.context.createBiquadFilter();
                
                source.buffer = buffer;
                source.loop = true;
                
                filter.type = 'lowpass';
                filter.frequency.value = 100;
                
                source.connect(filter);
                filter.connect(this.gainNode);
                filter.connect(this.analyser);
                
                source.start();
            }
        }
        
        const soundEngine = new SoundEngine();
        
        // 自定义光标
        document.addEventListener('mousemove', (e) => {
            const cursor = document.querySelector('.cursor');
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';

        // Matrix 代码雨效果
        function initMatrix() {
            const canvas = document.getElementById('matrix-bg');
            const ctx = canvas.getContext('2d');
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const matrix = CONFIG.sparkWords.join('').split('');
            const fontSize = 14;
            const columns = canvas.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);
            
            function draw() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.02)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = 'rgba(255, 103, 55, 0.8)';
                ctx.font = fontSize + 'px Fira Code';
                
                for (let i = 0; i < drops.length; i++) {
                    const text = matrix[Math.floor(Math.random() * matrix.length)];
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.985) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }
            
            setInterval(draw, CONFIG.matrixSpeed);
        }
        
        // 音频可视化波形 - 更平滑的心跳效果
        function updateWaveform() {
            const svg = document.getElementById('waveform-svg');
            const path = document.getElementById('waveform');
            const innerPath = document.getElementById('waveform-inner');
            const width = svg.clientWidth;
            const height = svg.clientHeight;
            const centerX = width / 2;
            const centerY = height / 2;
            const radius = Math.min(width, height) * 0.35;
            
            const points = 64; // 减少点数，更平滑
            let pathData = '';
            let innerPathData = '';
            
            // 模拟心跳波形
            const time = Date.now() * 0.0003; // 更慢的速度
            
            for (let i = 0; i <= points; i++) {
                const angle = (i / points) * Math.PI * 2;
                
                // 外层波形 - 主心跳
                let waveHeight = 8;
                waveHeight += Math.sin(time + i * 0.05) * 4;
                waveHeight += Math.sin(time * 2 + i * 0.1) * 2;
                
                // 偶尔的强心跳
                if (Math.sin(time * 0.5) > 0.8) {
                    waveHeight += Math.sin(time * 4 + i * 0.2) * 6;
                }
                
                const r = radius + waveHeight;
                const x = centerX + Math.cos(angle) * r;
                const y = centerY + Math.sin(angle) * r;
                
                // 内层波形 - 更柔和
                const innerWaveHeight = waveHeight * 0.5;
                const innerR = radius - 5 + innerWaveHeight;
                const innerX = centerX + Math.cos(angle) * innerR;
                const innerY = centerY + Math.sin(angle) * innerR;
                
                if (i === 0) {
                    pathData += `M ${x} ${y}`;
                    innerPathData += `M ${innerX} ${innerY}`;
                } else {
                    pathData += ` L ${x} ${y}`;
                    innerPathData += ` L ${innerX} ${innerY}`;
                }
            }
            
            pathData += ' Z';
            innerPathData += ' Z';
            path.setAttribute('d', pathData);
            innerPath.setAttribute('d', innerPathData);
            
            requestAnimationFrame(updateWaveform);
        }
        
        // 火花粒子生成 - 更缓慢的运动
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const offsetX = (Math.random() - 0.5) * 300;
            const offsetY = (Math.random() - 0.5) * 300;
            
            particle.style.left = (centerX + offsetX) + 'px';
            particle.style.top = (centerY + offsetY) + 'px';
            
            // 更小的运动范围，更缓慢的飘动
            const tx = (Math.random() - 0.5) * 200;
            const ty = -Math.random() * 150 - 50; // 主要向上飘
            particle.style.setProperty('--tx', tx + 'px');
            particle.style.setProperty('--ty', ty + 'px');
            
            document.getElementById('particles').appendChild(particle);
            
            // 动画时间延长
            setTimeout(() => particle.remove(), 15000);
        }
        
        // 数字变化动画 - 平滑过渡，无闪烁
        function updateDigit(elementId, newValue, oldValue) {
            if (newValue !== oldValue) {
                const element = document.getElementById(elementId);
                const parent = element.parentElement;
                
                // 平滑过渡
                parent.classList.add('changing');
                setTimeout(() => {
                    element.textContent = newValue;
                    parent.classList.remove('changing');
                }, 300);
                
                // 播放轻柔的tick声音
                if (CONFIG.soundEnabled) {
                    soundEngine.playTick();
                }
                
                // 偶尔生成粒子（频率降低）
                if (Math.random() > 0.95) {
                    createParticle();
                }
            }
        }
        
        // 打字机效果状态
        let typewriterState = {
            currentText: 'Spark it forward',
            fullText: 'Spark it forward',
            isDeleting: false,
            isRotating: false,
            rotateIndex: 0,
            typewriterTimeout: null
        };
        
        const rotateWords = ['Stealth', 'Speed', 'Subtraction', 'Synergy'];
        
        function updateTypewriterEffect() {
            const activityElement = document.getElementById('activity');
            if (!activityElement) return;
            
            // 清除之前的定时器
            if (typewriterState.typewriterTimeout) {
                clearTimeout(typewriterState.typewriterTimeout);
            }
            
            if (typewriterState.isRotating) {
                // 轮换显示其他文字
                if (typewriterState.rotateIndex < rotateWords.length) {
                    activityElement.textContent = rotateWords[typewriterState.rotateIndex];
                    typewriterState.rotateIndex++;
                    
                    // 每个文字显示1.5秒
                    typewriterState.typewriterTimeout = setTimeout(() => {
                        updateTypewriterEffect();
                    }, 1500);
                } else {
                    // 轮换完成，重新开始显示 "Spark it forward"
                    typewriterState.isRotating = false;
                    typewriterState.rotateIndex = 0;
                    typewriterState.isDeleting = false;
                    updateTypewriterEffect();
                }
            } else if (!typewriterState.isDeleting) {
                // 显示完整文本
                typewriterState.currentText = typewriterState.fullText;
                activityElement.textContent = typewriterState.currentText;
                
                // 等待2秒后开始删除
                typewriterState.typewriterTimeout = setTimeout(() => {
                    typewriterState.isDeleting = true;
                    updateTypewriterEffect();
                }, 2000);
            } else {
                // 删除字符
                if (typewriterState.currentText.length > 5) { // "Spark" 是5个字符
                    typewriterState.currentText = typewriterState.currentText.slice(0, -1);
                    activityElement.textContent = typewriterState.currentText;
                    
                    // 继续删除
                    typewriterState.typewriterTimeout = setTimeout(() => {
                        updateTypewriterEffect();
                    }, 80); // 每80ms删除一个字符
                } else {
                    // 删除完成，只保留 "Spark"，开始轮换其他文字
                    typewriterState.isDeleting = false;
                    typewriterState.isRotating = true;
                    typewriterState.rotateIndex = 0;
                    typewriterState.typewriterTimeout = setTimeout(() => {
                        updateTypewriterEffect();
                    }, 1000);
                }
            }
        }
        
        // 生命体征模拟
        function updateVitals() {
            // 模拟心率
            const heartRate = 60 + Math.floor(Math.random() * 30);
            document.getElementById('heartRate').textContent = heartRate;
            
            // 模拟活动状态（只包含其他文字，Spark it forward 由打字机效果处理）
            const activities = ['Spark', 'Stealth', 'Speed', 'Subtraction', 'Synergy'];
            const activityElement = document.getElementById('activity');
            
            // 只有在不显示打字机效果时才显示其他活动状态
            // 打字机效果由独立的定时器处理，这里不做处理
            
            // 模拟提交数 - 添加glitch效果
            const commitsElement = document.getElementById('commits');
            const currentCommits = parseInt(commitsElement.textContent, 10) || 0;
            
            // 偶尔增加commits
            if (Math.random() > 0.95) {
                commitsElement.textContent = currentCommits + 1;
            }
            
            // 随机glitch效果
            if (Math.random() > 0.8) {
                commitsElement.classList.add('glitching');
                setTimeout(() => {
                    commitsElement.classList.remove('glitching');
                }, 300);
            }
        }
        
        /** 上海墙钟的时 / 分 / 秒；Intl 不可用时回退为本机本地时 */
        function getShanghaiClock(now) {
            try {
                const parts = new Intl.DateTimeFormat('en-GB', {
                    timeZone: CONFIG.timeZone,
                    hour: 'numeric',
                    minute: 'numeric',
                    second: 'numeric',
                    hour12: false
                }).formatToParts(now);
                const pick = (t) => {
                    const p = parts.find((x) => x.type === t);
                    return p ? parseInt(p.value, 10) : 0;
                };
                return { hour: pick('hour'), minute: pick('minute'), second: pick('second') };
            } catch (e) {
                return { hour: now.getHours(), minute: now.getMinutes(), second: now.getSeconds() };
            }
        }

        // 21:00 仪式触发（按上海时间）
        function checkRitual() {
            const now = new Date();
            const { hour, minute, second } = getShanghaiClock(now);
            if (hour === CONFIG.ritualHour && minute === 0 && second < 2) {
                triggerRitual();
            }
        }
        
        function triggerRitual() {
            const overlay = document.getElementById('ritualOverlay');
            const message = document.getElementById('ritualMessage');
            if (!overlay || !message) {
                return;
            }

            // 随机选择消息
            const randomMessage = CONFIG.ritualMessages[Math.floor(Math.random() * CONFIG.ritualMessages.length)];
            message.textContent = randomMessage;
            
            overlay.classList.add('active');
            message.classList.add('active');
            
            // 播放仪式声音
            soundEngine.playRitualSound();
            
            // 生成适量粒子 - 更内敛
            for (let i = 0; i < 20; i++) {
                setTimeout(createParticle, i * 100);
            }
            
            // 12秒后移除效果
            setTimeout(() => {
                overlay.classList.remove('active');
                message.classList.remove('active');
            }, 12000);
        }
        
        function showCompletionMessage() {
            // 仅控制「S5 已结束」那一行；#residencyTagline 文案始终在 HTML 中固定，不随终态写入
            const completion = document.getElementById('completionMessage');
            if (completion) {
                completion.style.display = 'block';
            }
        }
        
        // 倒计时主逻辑（起止时刻为上海墙钟，与用户本地时区无关，显示为绝对剩余时间）
        function updateCountdown() {
            const now = new Date();
            const nowMs = now.getTime();
            const tStart = CONFIG.startDate.getTime();
            const tEnd = CONFIG.endDate.getTime();
            const isOutsideCountdownWindow = now < CONFIG.startDate || now >= CONFIG.endDate;

            const FLICKER_RADIUS_MS = 10000;
            const inBoundaryFlicker =
                Math.abs(nowMs - tStart) <= FLICKER_RADIUS_MS || Math.abs(nowMs - tEnd) <= FLICKER_RADIUS_MS;
            if (inBoundaryFlicker) {
                document.body.classList.add('countdown-flicker');
                const oneSecond = 1000;
                const useInactiveTheme = Math.floor(nowMs / oneSecond) % 2 === 0;
                document.body.classList.toggle('countdown-inactive', useInactiveTheme);
            } else {
                document.body.classList.remove('countdown-flicker');
                document.body.classList.toggle('countdown-inactive', isOutsideCountdownWindow);
            }

            const remaining = CONFIG.endDate.getTime() - now.getTime();
            const elapsed = now.getTime() - CONFIG.startDate.getTime();
            const total = CONFIG.endDate.getTime() - CONFIG.startDate.getTime();
            
            if (remaining <= 0) {
                if (!countdownFinished) {
                    const ids = ['days-tens','days-ones','hours-tens','hours-ones','minutes-tens','minutes-ones','seconds-tens','seconds-ones'];
                    ids.forEach(id => {
                        const el = document.getElementById(id);
                        if (el) el.textContent = '0';
                    });
                    document.getElementById('milliseconds').textContent = '.000';
                    document.getElementById('progress').style.width = '100%';
                    showCompletionMessage();
                    countdownFinished = true;
                }
                if (countdownInterval && nowMs > tEnd + FLICKER_RADIUS_MS) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
                return;
            }
            
            // 时间感知的视觉增强
            const hoursRemaining = remaining / (1000 * 60 * 60);
            if (hoursRemaining <= 24) {
                // 最后24小时增强效果
                document.documentElement.style.setProperty('--glow-intensity', '0.8');
                if (hoursRemaining <= 1) {
                    // 最后1小时颜色变深
                    document.documentElement.style.setProperty('--main-color', '#ff4520');
                }
            }
            
            // 计算剩余时间：天数、小时、分钟、秒数（42天周期）
            const days = Math.floor(remaining / (1000 * 60 * 60 * 24));
            const hours = Math.floor((remaining % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((remaining % (1000 * 60)) / 1000);
            const milliseconds = remaining % 1000;
            
            // 保存旧值
            const oldValues = {
                daysTens: document.getElementById('days-tens').textContent,
                daysOnes: document.getElementById('days-ones').textContent,
                hoursTens: document.getElementById('hours-tens').textContent,
                hoursOnes: document.getElementById('hours-ones').textContent,
                minutesTens: document.getElementById('minutes-tens').textContent,
                minutesOnes: document.getElementById('minutes-ones').textContent,
                secondsTens: document.getElementById('seconds-tens').textContent,
                secondsOnes: document.getElementById('seconds-ones').textContent
            };
            
            // 更新显示
            const daysTens = Math.floor(days / 10);
            const daysOnes = days % 10;
            const hoursTens = Math.floor(hours / 10);
            const hoursOnes = hours % 10;
            const minutesTens = Math.floor(minutes / 10);
            const minutesOnes = minutes % 10;
            const secondsTens = Math.floor(seconds / 10);
            const secondsOnes = seconds % 10;
            
            updateDigit('days-tens', daysTens, oldValues.daysTens);
            updateDigit('days-ones', daysOnes, oldValues.daysOnes);
            updateDigit('hours-tens', hoursTens, oldValues.hoursTens);
            updateDigit('hours-ones', hoursOnes, oldValues.hoursOnes);
            updateDigit('minutes-tens', minutesTens, oldValues.minutesTens);
            updateDigit('minutes-ones', minutesOnes, oldValues.minutesOnes);
            updateDigit('seconds-tens', secondsTens, oldValues.secondsTens);
            updateDigit('seconds-ones', secondsOnes, oldValues.secondsOnes);
            
            // 更新毫秒（简化显示）
            const displayMs = Math.floor(milliseconds / 10) * 10; // 显示10的倍数
            document.getElementById('milliseconds').textContent = '.' + displayMs.toString().padStart(3, '0');
            
            // 更新进度条
            const progress = total > 0 ? Math.min(100, Math.max(0, (elapsed / total) * 100)) : 0;
            document.getElementById('progress').style.width = progress + '%';
            
            // 整点特效 - 更克制
            if (minutes === 0 && seconds === 0 && milliseconds < 100) {
                soundEngine.playHourChime();
                for (let i = 0; i < 5; i++) {
                    setTimeout(createParticle, i * 200);
                }
            }
            
            // 检查21:00仪式
            checkRitual();
        }
        
        // Community Dinner 进度条：每周一 18:30（上海时间）为周期锚点
        function pad2(n) {
            return String(n).padStart(2, '0');
        }

        function getShanghaiYMDString(d) {
            try {
                const part = d.toLocaleString('sv-SE', { timeZone: CONFIG.timeZone }).split(' ')[0];
                if (part && /^\d{4}-\d{1,2}-\d{1,2}$/.test(part)) {
                    return part;
                }
            } catch (e) { /* Intl 时区不可用时回退本机 */ }
            return d.toLocaleString('sv-SE').split(' ')[0];
        }

        function getShanghaiLocalDateTime(y, m, d, h, min, s) {
            return new Date(`${y}-${pad2(m)}-${pad2(d)}T${pad2(h)}:${pad2(min)}:${pad2(s)}+08:00`);
        }

        function getShanghaiShortWeekdayKey(d) {
            try {
                return d.toLocaleDateString('en-US', { timeZone: CONFIG.timeZone, weekday: 'short' });
            } catch (e) {
                return d.toLocaleDateString('en-US', { weekday: 'short' });
            }
        }

        function getCurrentWeekStart() {
            const now = new Date();
            const ymd = getShanghaiYMDString(now).split('-').map((x) => parseInt(x, 10));
            const y = ymd[0];
            const m = ymd[1];
            const d = ymd[2];
            const dayStart = getShanghaiLocalDateTime(y, m, d, 0, 0, 0);
            const wk = { Sun: 0, Mon: 1, Tue: 2, Wed: 3, Thu: 4, Fri: 5, Sat: 6 }[getShanghaiShortWeekdayKey(now)] ?? 0;
            const daysBack = (wk + 6) % 7;
            const thisMonday0 = new Date(dayStart.getTime() - daysBack * MS_PER_DAY);
            const thisWeekDinner = new Date(thisMonday0.getTime() + (18 * 60 + 30) * 60 * 1000);
            if (now < thisWeekDinner) {
                return new Date(thisWeekDinner.getTime() - 7 * MS_PER_DAY);
            }
            return thisWeekDinner;
        }

        function getNextWeekStart() {
            return new Date(getCurrentWeekStart().getTime() + 7 * MS_PER_DAY);
        }

        function formatDate(date) {
            const months = ['Jan.', 'Feb.', 'Mar.', 'Apr.', 'May', 'Jun.', 'Jul.', 'Aug.', 'Sep.', 'Oct.', 'Nov.', 'Dec.'];
            const ymd = getShanghaiYMDString(date).split('-').map((x) => parseInt(x, 10));
            return `${months[ymd[1] - 1]} ${ymd[2]}`;
        }

        function formatShipItCountdown(remainingMs) {
            if (remainingMs <= 0) {
                return '00:00:00';
            }
            const d = Math.floor(remainingMs / 86400000);
            const h = Math.floor((remainingMs % 86400000) / 3600000);
            const m = Math.floor((remainingMs % 3600000) / 60000);
            const s = Math.floor((remainingMs % 60000) / 1000);
            if (d > 0) {
                return `${d}d ${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function updateCommunityDinnerProgress() {
            const progressBar = document.getElementById('communityDinnerProgress');
            const progressMarker = document.getElementById('communityDinnerMarker');
            const dateElement = document.getElementById('communityDinnerDate');
            const countdownElement = document.getElementById('communityDinnerCountdown');
            const container = progressBar ? progressBar.parentElement : null;
            if (!container) {
                return;
            }

            const now = new Date();
            const weekStart = getCurrentWeekStart();
            const weekEnd = getNextWeekStart();
            const total = weekEnd.getTime() - weekStart.getTime();
            const elapsed = now.getTime() - weekStart.getTime();
            const pct = total > 0 ? Math.min(100, Math.max(0, (elapsed / total) * 100)) : 0;
            const remaining = weekEnd.getTime() - now.getTime();

            if (progressBar) {
                progressBar.style.width = pct + '%';
            }

            if (progressMarker) {
                const containerWidth = container.offsetWidth;
                progressMarker.style.left = (containerWidth * pct) / 100 + 'px';
            }

            if (dateElement) {
                dateElement.textContent = formatDate(weekEnd);
            }

            if (countdownElement) {
                countdownElement.textContent = formatShipItCountdown(remaining);
            }
        }
        
        function scheduleWeeklyRefresh() {
            const now = new Date();
            const nextMonday = getNextWeekStart();
            const msUntilRefresh = nextMonday.getTime() - now.getTime();
            
            // 设置定时器在下一个周一18:30刷新
            setTimeout(() => {
                updateCommunityDinnerProgress();
                // 之后每7天刷新一次
                setInterval(updateCommunityDinnerProgress, 7 * 24 * 60 * 60 * 1000);
            }, msUntilRefresh);
        }
        
        // 声音开关 - 用户手动控制时才开启
        document.getElementById('soundToggle').addEventListener('click', function() {
            CONFIG.soundEnabled = !CONFIG.soundEnabled;
            this.classList.toggle('muted');
            this.classList.toggle('unmuted');
            
            if (CONFIG.soundEnabled) {
                soundEngine.init();
                soundEngine.startAmbient();
            }
        });
        
        // 点击页面任意位置开启声音（用于绕过浏览器自动播放限制）
        document.addEventListener('click', function initSound() {
            if (!soundEngine.initialized && CONFIG.soundEnabled) {
                soundEngine.init();
                soundEngine.startAmbient();
                document.removeEventListener('click', initSound);
            }
        });
        
        // 窗口调整
        window.addEventListener('resize', () => {
            const canvas = document.getElementById('matrix-bg');
            if (canvas) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });
        
        // 初始化
        initMatrix();
        updateWaveform();
        setInterval(createParticle, CONFIG.particleInterval);
        countdownInterval = setInterval(updateCountdown, 10);
        setInterval(updateVitals, 3000);
        
        // Community Dinner 进度条初始化
        updateCommunityDinnerProgress();
        setInterval(updateCommunityDinnerProgress, 1000); // 每秒更新一次进度
        scheduleWeeklyRefresh(); // 设置每周一18:30自动刷新
        
        // 启动打字机效果
        updateTypewriterEffect();
        
        // 立即执行一次
        updateCountdown();
        
        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            // 按空格键触发仪式（测试用）
            if (e.code === 'Space') {
                e.preventDefault();
                triggerRitual();
            }
        });
    </script>
</body>
</html>
